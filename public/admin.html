<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin | Flora &amp; Gifts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="assets/css/styles.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/js/tailwind-config.js"></script>
</head>
<body class="bg-background text-on-background" data-page="admin">

<div id="site-ambient"></div>
<div id="site-nav"></div>

<main class="px-margin-mobile md:px-margin-desktop py-12 md:py-16 max-w-container-max mx-auto">
  <div class="text-center mb-10 md:mb-12 reveal">
    <span class="font-label text-label-sm text-secondary tracking-widest uppercase mb-3 block">Atelier Management</span>
    <h1 class="font-display text-headline-lg-mobile md:text-headline-lg text-primary">Admin Dashboard</h1>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-6 md:gap-8">
    <aside class="bg-tertiary text-tertiary-fixed-dim rounded-xl p-3 lg:sticky lg:top-32 self-start reveal">
      <nav class="flex flex-row lg:flex-col gap-1 overflow-x-auto">
        <button class="admin-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left whitespace-nowrap hover:bg-white/10 transition" data-section="dashboard">
          <span class="material-symbols-outlined text-[20px]">dashboard</span><span class="font-label text-label-sm">Dashboard</span>
        </button>
        <button class="admin-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left whitespace-nowrap hover:bg-white/10 transition" data-section="aproducts">
          <span class="material-symbols-outlined text-[20px]">local_florist</span><span class="font-label text-label-sm">Products</span>
        </button>
        <button class="admin-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left whitespace-nowrap hover:bg-white/10 transition" data-section="aorders">
          <span class="material-symbols-outlined text-[20px]">shopping_bag</span><span class="font-label text-label-sm">Orders</span>
        </button>
        <button class="admin-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left whitespace-nowrap hover:bg-white/10 transition" data-section="aresv">
          <span class="material-symbols-outlined text-[20px]">event</span><span class="font-label text-label-sm">Reservations</span>
        </button>
        <button class="admin-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left whitespace-nowrap hover:bg-white/10 transition" data-section="ausers">
          <span class="material-symbols-outlined text-[20px]">group</span><span class="font-label text-label-sm">Users</span>
        </button>
      </nav>
    </aside>
    <section id="adminContent" class="reveal min-h-[400px]"></section>
  </div>
</main>

<div id="site-footer"></div>
<script src="assets/js/app.js"></script>
</body>
</html>
